server:
  port: 8080

spring:
  application:
    name: aichat-backend

  # 数据库配置（本地开发默认值可被环境变量覆盖）
  # 注意：本项目使用 MySQL 8+，建议库字符集为 utf8mb4
  datasource:
    url: ${AICHAT_DB_URL:jdbc:mysql://localhost:3306/aichat?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${AICHAT_DB_USER:aichat_user}
    password: ${AICHAT_DB_PASSWORD:aichat123!}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

aichat:
  wechat:
    app-id: ${AICHAT_WECHAT_APP_ID:}
    app-secret: ${AICHAT_WECHAT_APP_SECRET:}
    callback-url: ${AICHAT_WECHAT_CALLBACK_URL:}
    post-login-redirect-url: ${AICHAT_WECHAT_POST_LOGIN_REDIRECT_URL:http://localhost:5174/}

