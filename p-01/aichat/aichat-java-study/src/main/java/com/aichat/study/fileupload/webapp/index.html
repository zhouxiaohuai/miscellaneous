<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件上传系统</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 880px;
  }

  .card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    color: #e8e8f0;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .header .icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header .subtitle {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.45);
    margin-left: auto;
  }

  /* ---------- Upload Zone ---------- */
  .upload-zone {
    position: relative;
    border: 2px dashed rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    padding: 36px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: rgba(255, 255, 255, 0.02);
    margin-bottom: 20px;
  }

  .upload-zone:hover,
  .upload-zone.dragover {
    border-color: #667eea;
    background: rgba(102, 126, 234, 0.08);
    transform: scale(1.005);
  }

  .upload-zone .upload-icon {
    font-size: 48px;
    line-height: 1;
    margin-bottom: 12px;
    opacity: 0.6;
  }

  .upload-zone .upload-text {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .upload-zone .upload-hint {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.4);
  }

  .upload-zone input[type="file"] {
    display: none;
  }

  /* ---------- File Info Preview ---------- */
  .file-preview {
    display: none;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 12px 16px;
    margin: 0 0 16px 0;
  }

  .file-preview.show {
    display: flex;
  }

  .file-preview .fp-icon {
    font-size: 28px;
    flex-shrink: 0;
  }

  .file-preview .fp-info {
    flex: 1;
    min-width: 0;
  }

  .file-preview .fp-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-preview .fp-size {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.45);
  }

  .file-preview .fp-remove {
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.35);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: 0.15s;
    line-height: 1;
  }

  .file-preview .fp-remove:hover {
    color: #ff6b6b;
    background: rgba(255, 107, 107, 0.12);
  }

  /* ---------- Upload Button ---------- */
  .upload-btn-wrap {
    text-align: center;
    margin-bottom: 32px;
  }

  .btn-upload {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    padding: 12px 40px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    letter-spacing: 0.3px;
  }

  .btn-upload:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
  }

  .btn-upload:active {
    transform: translateY(0);
  }

  .btn-upload:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* ---------- Divider ---------- */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    color: rgba(255, 255, 255, 0.3);
    font-size: 13px;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255, 255, 255, 0.08);
  }

  /* ---------- File List ---------- */
  .file-list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .file-list-header h2 {
    font-size: 16px;
    font-weight: 600;
  }

  .file-count {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.4);
    background: rgba(255, 255, 255, 0.06);
    padding: 2px 10px;
    border-radius: 20px;
  }

  .file-table {
    width: 100%;
    border-collapse: collapse;
  }

  .file-table thead th {
    text-align: left;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.35);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  .file-table tbody tr {
    transition: background 0.15s;
  }

  .file-table tbody tr:hover {
    background: rgba(255, 255, 255, 0.04);
  }

  .file-table tbody td {
    padding: 12px;
    font-size: 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
  }

  .file-table tbody td .file-icon {
    margin-right: 8px;
    font-size: 16px;
  }

  .file-name-cell {
    display: flex;
    align-items: center;
  }

  .file-name-cell a {
    color: #a8b2ff;
    text-decoration: none;
    transition: 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
    display: inline-block;
  }

  .file-name-cell a:hover {
    color: #c0c8ff;
    text-decoration: underline;
  }

  .file-size-cell,
  .file-time-cell {
    color: rgba(255, 255, 255, 0.5);
    white-space: nowrap;
  }

  .file-type-badge {
    display: inline-block;
    background: rgba(102, 126, 234, 0.15);
    color: #a8b2ff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 500;
  }

  /* ---------- Empty State ---------- */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: rgba(255, 255, 255, 0.25);
  }

  .empty-state .empty-icon {
    font-size: 40px;
    margin-bottom: 8px;
    opacity: 0.5;
  }

  .empty-state .empty-text {
    font-size: 14px;
  }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed;
    top: 24px;
    right: 24px;
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    opacity: 0;
    transform: translateY(-12px);
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 999;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  .toast.success {
    background: rgba(46, 204, 113, 0.9);
  }

  .toast.error {
    background: rgba(231, 76, 60, 0.9);
  }

  /* ---------- Loading ---------- */
  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    background: #fff;
    border-radius: 50%;
    animation: dot-bounce 1.2s infinite;
  }

  .loading-dots span:nth-child(2) {
    animation-delay: 0.2s;
  }

  .loading-dots span:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 640px) {
    .card {
      padding: 24px 16px;
    }

    .file-table thead {
      display: none;
    }

    .file-table tbody tr {
      display: block;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .file-table tbody td {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border: none;
      font-size: 13px;
    }

    .file-table tbody td::before {
      content: attr(data-label);
      color: rgba(255, 255, 255, 0.35);
      font-size: 12px;
    }

    .file-name-cell a {
      max-width: 160px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <!-- Header -->
    <div class="header">
      <div class="icon">📁</div>
      <h1>文件上传系统</h1>
      <span class="subtitle">本地模拟存储</span>
    </div>

    <!-- Upload Zone -->
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">☁️</div>
      <div class="upload-text">拖拽文件到此处，或点击选择</div>
      <div class="upload-hint">支持任意类型文件，最大 50MB</div>
      <input type="file" id="fileInput">
    </div>

    <!-- File Preview -->
    <div class="file-preview" id="filePreview">
      <span class="fp-icon">📄</span>
      <div class="fp-info">
        <div class="fp-name" id="fileName"></div>
        <div class="fp-size" id="fileSize"></div>
      </div>
      <button class="fp-remove" id="removeFile" title="移除文件">✕</button>
    </div>

    <!-- Upload Button -->
    <div class="upload-btn-wrap">
      <button class="btn-upload" id="btnUpload" disabled>上传文件</button>
    </div>

    <!-- Divider -->
    <div class="divider">已上传文件</div>

    <!-- File List -->
    <div class="file-list-header">
      <h2>文件列表</h2>
      <span class="file-count" id="fileCount">0 个文件</span>
    </div>

    <div id="fileListContainer">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📂</div>
        <div class="empty-text">暂无上传文件</div>
      </div>
      <table class="file-table" id="fileTable" style="display:none;">
        <thead>
          <tr>
            <th>文件名</th>
            <th>大小</th>
            <th>类型</th>
            <th>上传时间</th>
          </tr>
        </thead>
        <tbody id="fileListBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  (function() {
    // ---- DOM refs ----
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreview');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const removeBtn = document.getElementById('removeFile');
    const btnUpload = document.getElementById('btnUpload');
    const fileListBody = document.getElementById('fileListBody');
    const fileTable = document.getElementById('fileTable');
    const emptyState = document.getElementById('emptyState');
    const fileCount = document.getElementById('fileCount');
    const toast = document.getElementById('toast');

    let selectedFile = null;

    // ---- Toast ----
    let toastTimer = null;
    function showToast(msg, type) {
      toast.textContent = msg;
      toast.className = 'toast ' + type + ' show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ---- Format Size ----
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // ---- Get file icon by type ----
    function getFileIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      const map = {
        pdf: '📕', doc: '📘', docx: '📘',
        xls: '📗', xlsx: '📗',
        ppt: '📙', pptx: '📙',
        zip: '📦', rar: '📦', '7z': '📦', gz: '📦', tar: '📦',
        jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', svg: '🖼️', webp: '🖼️',
        mp3: '🎵', wav: '🎵', flac: '🎵',
        mp4: '🎬', avi: '🎬', mov: '🎬',
        js: '📜', ts: '📜', java: '☕', py: '🐍',
        html: '🌐', css: '🎨', json: '📋',
      };
      return map[ext] || '📄';
    }

    // ---- Upload Zone Click ----
    uploadZone.addEventListener('click', () => fileInput.click());

    // ---- Drag & Drop ----
    ['dragenter', 'dragover'].forEach(evt => {
      uploadZone.addEventListener(evt, (e) => {
        e.preventDefault();
        uploadZone.classList.add('dragover');
      });
    });
    ['dragleave', 'drop'].forEach(evt => {
      uploadZone.addEventListener(evt, (e) => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
      });
    });
    uploadZone.addEventListener('drop', (e) => {
      const files = e.dataTransfer.files;
      if (files.length > 0) selectFile(files[0]);
    });

    // ---- File Input Change ----
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) selectFile(fileInput.files[0]);
    });

    // ---- Select File ----
    function selectFile(file) {
      if (file.size > 50 * 1024 * 1024) {
        showToast('文件大小超过 50MB 限制', 'error');
        return;
      }
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatSize(file.size);
      filePreview.classList.add('show');
      btnUpload.disabled = false;
    }

    // ---- Remove File ----
    removeBtn.addEventListener('click', () => {
      clearSelection();
    });

    function clearSelection() {
      selectedFile = null;
      fileInput.value = '';
      filePreview.classList.remove('show');
      btnUpload.disabled = true;
    }

    // ---- Upload ----
    btnUpload.addEventListener('click', async () => {
      if (!selectedFile) return;

      btnUpload.disabled = true;
      btnUpload.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const resp = await fetch('/api/upload', { method: 'POST', body: formData });
        const result = await resp.json();

        if (result.success) {
          clearSelection();
          showToast('上传成功！', 'success');
          await loadFileList();
        } else {
          showToast(result.error || '上传失败', 'error');
        }
      } catch (err) {
        showToast('网络错误：' + err.message, 'error');
      } finally {
        btnUpload.disabled = false;
        btnUpload.textContent = '上传文件';
      }
    });

    // ---- Load File List ----
    async function loadFileList() {
      try {
        const resp = await fetch('/api/files');
        const files = await resp.json();

        fileListBody.innerHTML = '';
        const len = files.length;

        if (len === 0) {
          emptyState.style.display = 'block';
          fileTable.style.display = 'none';
          fileCount.textContent = '0 个文件';
          return;
        }

        emptyState.style.display = 'none';
        fileTable.style.display = '';

        files.forEach(f => {
          const tr = document.createElement('tr');

          // Name
          const tdName = document.createElement('td');
          tdName.setAttribute('data-label', '文件名');
          tdName.className = 'file-name-cell';
          tdName.innerHTML = '<span class="file-icon">' + getFileIcon(f.originalName) + '</span>' +
            '<a href="/api/files/' + f.storedName + '" target="_blank" title="' + f.originalName + '">' +
            f.originalName + '</a>';
          tr.appendChild(tdName);

          // Size
          const tdSize = document.createElement('td');
          tdSize.setAttribute('data-label', '大小');
          tdSize.className = 'file-size-cell';
          tdSize.textContent = f.formattedSize;
          tr.appendChild(tdSize);

          // Type
          const tdType = document.createElement('td');
          tdType.setAttribute('data-label', '类型');
          const badge = document.createElement('span');
          badge.className = 'file-type-badge';
          badge.textContent = f.contentType || '未知';
          tdType.appendChild(badge);
          tr.appendChild(tdType);

          // Time
          const tdTime = document.createElement('td');
          tdTime.setAttribute('data-label', '上传时间');
          tdTime.className = 'file-time-cell';
          tdTime.textContent = f.uploadTime;
          tr.appendChild(tdTime);

          fileListBody.appendChild(tr);
        });

        fileCount.textContent = len + ' 个文件';
      } catch (err) {
        console.error('加载文件列表失败:', err);
      }
    }

    // ---- Auto load on init ----
    loadFileList();
  })();
</script>

</body>
</html>
