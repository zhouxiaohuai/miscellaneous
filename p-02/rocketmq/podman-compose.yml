version: '3.8'

services:
  # NameServer - 路由注册中心
  namesrv:
    image: apache/rocketmq:5.3.1
    container_name: rmqnamesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    volumes:
      - ./data/namesrv/logs:/home/rocketmq/logs
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"
    networks:
      - rocketmq

  # Broker - 消息代理
  broker:
    image: apache/rocketmq:5.3.1
    container_name: rmqbroker
    ports:
      - "10911:10911"
      - "10909:10909"
    command: sh mqbroker -c /home/rocketmq/rocketmq.conf
    volumes:
      - ./data/broker/logs:/home/rocketmq/logs
      - ./data/broker/store:/home/rocketmq/store
      - ./conf/broker.conf:/home/rocketmq/rocketmq.conf
    environment:
      NAMESRV_ADDR: "namesrv:9876"
      JAVA_OPT_EXT: "-Xms512m -Xmx512m"
    depends_on:
      - namesrv
    networks:
      - rocketmq

  # Dashboard - 管理界面
  dashboard:
    image: apache/rocketmq-dashboard:latest
    container_name: rmqdashboard
    ports:
      - "18080:8080"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=namesrv:9876 -Dcom.rocketmq.sendMessageWithVIPChannel=false"
    depends_on:
      - namesrv
      - broker
    networks:
      - rocketmq

networks:
  rocketmq:
    driver: bridge
